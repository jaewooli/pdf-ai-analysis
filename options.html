<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Summarizer 설정</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input[type="password"], input[type="text"] { 
      width: 100%; 
      padding: 8px; 
      box-sizing: border-box; 
    }
    button { 
      padding: 10px 15px; 
      background-color: #4CAF50; 
      color: white; 
      border: none; 
      cursor: pointer; 
    }
    button:hover { background-color: #45a049; }
    #status { margin-top: 15px; color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h2>API 키 관리</h2>
  
  <div class="form-group">
    <label for="openai-key">OpenAI API Key</label>
    <input type="password" id="openai-key" placeholder="sk-...">
  </div>

  <div class="form-group">
    <label for="gemini-key">Google Gemini API Key</label>
    <input type="password" id="gemini-key" placeholder="AIza...">
  </div>

  <button id="save-btn">저장하기</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
